in_source: |
  .const USE_TEXT 1
  .const EMIT_EXTRA 1
  
  .macro EMIT value
      MOV value, R1
      OUT R1, 0
  .endmacro
  
  .macro PRINT label
      OUT_CSTR label
  .endmacro
  
  .section text
  .org 0
  _start:
  .ifdef USE_TEXT
      PRINT msg
  .else
      EMIT #'?'
  .endif
  .ifndef DISABLED_FEATURE
      EMIT #'N'
  .endif
  .ifconst EMIT_EXTRA
      EMIT #'C'
  .else
      EMIT #'?'
  .endif
      HLT
  
  .section data
  .org 0
  msg:
      .cstr "M"
in_input: ''
in_limit: 100000
