in_source: |
  .section text
  .org 0
  _start:
      OUT_CSTR msg
      HLT

  .section data
  .org 0
  msg:
      .cstr "Hello, world!"
in_input: ''
in_limit: 100000
out:
  out_stdout: Hello, world!
  out_code_log: |
    0000 - 10080000 - OUT_CSTR msg
    0004 - 01 - HLT
  out_trace_contains: |
    OUT_CSTR[0] <- char=33 addr=000C
