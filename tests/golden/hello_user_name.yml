in_source: |
  .const NEWLINE 10

  .section text
  .org 0
  _start:
      OUT_CSTR question
      OUT_CSTR hello

  read_loop:
      IN 0, R1
      CMP #NEWLINE, R1
      BEQ done_read
      OUT R1, 0
      JMP read_loop

  done_read:
      OUT_CSTR suffix
      HLT

  .section data
  .org 0
  question:
      .cstr "What is your name?"
  hello:
      .cstr "Hello, "
  suffix:
      .cstr "!"
in_input: |+
  Alice

in_limit: 100000
out:
  out_stdout: What is your name?Hello, Alice!
  out_binary_hex: 
  out_code_log: |
    0000 - 10800000 - OUT_CSTR question
    0004 - 10800013 - OUT_CSTR hello
    0008 - 0E6100000001 - IN 0, R1
    000E - 0851000A0001 - CMP #NEWLINE, R1
    0014 - 09700022 - BEQ done_read
    0018 - 0F1600010000 - OUT R1, 0
    001E - 0D700008 - JMP read_loop
    0022 - 1080001B - OUT_CSTR suffix
    0026 - 01 - HLT

  out_trace: |
