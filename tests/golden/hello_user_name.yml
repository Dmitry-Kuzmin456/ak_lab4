in_source: |
  .const NEWLINE 10

  .section text
  .org 0
  _start:
      OUT_CSTR question
      OUT_CSTR hello

  read_loop:
      IN 0
      CMP_IMM NEWLINE
      BEQ done_read
      OUT 0
      JMP read_loop

  done_read:
      OUT_CSTR suffix
      HLT

  .section data
  .org 0
  question:
      .cstr "What is your name?"
  hello:
      .cstr "Hello, "
  suffix:
      .cstr "!"
in_input: |+
  Alice

in_limit: 100000
out:
  out_stdout: |-
    What is your name?Hello, Alice!
  out_code_log: |
    0000 - 1C0000 - OUT_CSTR question
    0003 - 1C0013 - OUT_CSTR hello
    0006 - 1A0000 - IN 0
    0009 - 190A - CMP_IMM 10
    000B - 120014 - BEQ done_read
    000E - 1B0000 - OUT 0
    0011 - 160006 - JMP read_loop
    0014 - 1C001B - OUT_CSTR suffix
    0017 - 01 - HLT
  out_trace_contains: |
    OUT_CSTR[0] <- char=87 addr=0000
    IN[0] -> AC=65
    OUT[0] <- AC=65
    IN[0] -> AC=10
    OUT_CSTR[0] <- char=33 addr=001B
