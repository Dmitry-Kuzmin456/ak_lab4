in_source: |
  .const NEWLINE 10

  .section text
  .org 0
  _start:
      MOV arr_base, R1
      MOV R1, p_write
      MOV zero, R1
      MOV R1, count

  read_loop:
      IN 0, R1
      CMP #NEWLINE, R1
      BEQ read_done
      MOV p_write, A1
      MOV R1, (A1)
      MOV p_write, R1
      INC R1
      MOV R1, p_write
      MOV count, R1
      INC R1
      MOV R1, count
      JMP read_loop

  read_done:
      MOV count, R1
      CMP one, R1
      BLT print_done
      BEQ print_loop_init

      MOV count, R1
      DEC R1
      MOV R1, outer_left

  outer_loop:
      MOV outer_left, R1
      CMP zero, R1
      BEQ print_loop_init

      MOV arr_base, R1
      MOV R1, p_a
      MOV arr_base, R1
      INC R1
      MOV R1, p_b
      MOV outer_left, R1
      MOV R1, inner_left

  inner_loop:
      MOV inner_left, R1
      CMP zero, R1
      BEQ outer_step

      MOV p_a, A1
      MOV (A1), R1
      MOV R1, a_val
      MOV p_b, A1
      MOV (A1), R1
      MOV R1, b_val

      MOV a_val, R1
      CMP b_val, R1
      BGT do_swap
      JMP no_swap

  do_swap:
      MOV b_val, R1
      MOV p_a, A1
      MOV R1, (A1)
      MOV a_val, R1
      MOV p_b, A1
      MOV R1, (A1)

  no_swap:
      MOV p_a, R1
      INC R1
      MOV R1, p_a
      MOV p_b, R1
      INC R1
      MOV R1, p_b
      MOV inner_left, R1
      DEC R1
      MOV R1, inner_left
      JMP inner_loop

  outer_step:
      MOV outer_left, R1
      DEC R1
      MOV R1, outer_left
      JMP outer_loop

  print_loop_init:
      MOV arr_base, R1
      MOV R1, p_print
      MOV count, R1
      MOV R1, print_left

  print_loop:
      MOV print_left, R1
      CMP zero, R1
      BEQ print_done
      MOV p_print, A1
      MOV (A1), R1
      OUT R1, 0
      MOV p_print, R1
      INC R1
      MOV R1, p_print
      MOV print_left, R1
      DEC R1
      MOV R1, print_left
      JMP print_loop

  print_done:
      HLT

  .section data
  .org 0
  zero:        .word 0
  one:         .word 1
  arr_base:    .word 32
  count:       .word 0
  outer_left:  .word 0
  inner_left:  .word 0
  print_left:  .word 0
  p_write:     .word 0
  p_a:         .word 0
  p_b:         .word 0
  p_print:     .word 0
  a_val:       .word 0
  b_val:       .word 0

  .org 32
  arr:
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
      .word 0
