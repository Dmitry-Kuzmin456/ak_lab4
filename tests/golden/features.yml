in_source: |
  .const USE_MSG 1

  .macro PRINT label
      OUT_CSTR label
  .endmacro

  .section text
  .org 0
  _start:
      MOV ptr, A1
      MOV (A1), R1
      OUT R1, 0
  .ifdef USE_MSG
      PRINT msg
  .else
      MOV #'?', R1
      OUT R1, 0
  .endif
      POLY #2, #1, #2, R1
      ADD #'0', R1
      OUT R1, 0
      MOV ZERO, R1
      ADD #'!', R1
      OUT R1, 0
      HLT

  .section data
  .org 0
  ptr:
      .word 1
  value:
      .word 'Z'
  msg:
      .cstr "OK"
in_input: ''
in_limit: 100000
out:
  out_stdout: ZOK5!
  out_code_log: |
    0000 - 03030000020000 - MOV ptr, A1
    0007 - 03040000010000 - MOV (A1), R1
    000E - 0F010000060000 - OUT R1, 0
    0015 - 10080002 - OUT_CSTR msg
    0019 - 1404050002050001050002010000 - POLY #2, #1, #2, R1
    0027 - 04050030010000 - ADD #'0', R1
    002E - 0F010000060000 - OUT R1, 0
    0035 - 03090000010000 - MOV ZERO, R1
    003C - 04050021010000 - ADD #'!', R1
    0043 - 0F010000060000 - OUT R1, 0
    004A - 01 - HLT
  out_trace_contains: |
    OUT[0] <- value=90
    OUT_CSTR[0] <- char=75 addr=0003
    OUT[0] <- value=53
    OUT[0] <- value=33
