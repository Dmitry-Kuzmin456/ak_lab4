in_source: |
  .const USE_MSG 1

  .macro PRINT label
      OUT_CSTR label
  .endmacro

  .section text
  .org 0
  _start:
      LD_IND ptr
      OUT 0
  .ifdef USE_MSG
      PRINT msg
  .else
      LD_IMM '?'
      OUT 0
  .endif
      HLT

  .section data
  .org 0
  ptr:
      .word 1
  value:
      .word 'Z'
  msg:
      .cstr "OK"
in_input: |2+

in_limit: 100000
out:
  out_stdout: |-
    ZOK
  out_code_log: |
    0000 - 050000 - LD_IND ptr
    0003 - 1B0000 - OUT 0
    0006 - 1C0002 - OUT_CSTR msg
    0009 - 01 - HLT
  out_trace_contains: |
    OUT[0] <- AC=90
    OUT_CSTR[0] <- char=79 addr=0002
    OUT_CSTR[0] <- char=75 addr=0003
