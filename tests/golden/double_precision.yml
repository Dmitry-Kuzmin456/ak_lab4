in_source: |
  .section text
  .org 0
  _start:
      MOV low_a, R1
      ADD low_b, R1
      MOV R1, low_result
      MOV high_a, R1
      ADD high_b, R1
      MOV R1, high_result

      MOV low_result, R1
      CMP low_expected, R1
      BNE fail
      MOV high_result, R1
      CMP high_expected, R1
      BNE fail
      OUT_CSTR ok
      HLT

  fail:
      OUT_CSTR err
      HLT

  .section data
  .org 0
  low_a:
      .word 5
  low_b:
      .word 6
  high_a:
      .word 1
  high_b:
      .word 2
  low_result:
      .word 0
  high_result:
      .word 0
  low_expected:
      .word 11
  high_expected:
      .word 3
  ok:
      .cstr "OK64"
  err:
      .cstr "ERR64"
