in_source: |
  .section text
  .org 0
  _start:
      MOV low_a, R1
      ADD low_b, R1
      MOV R1, low_result
      MOV high_a, R1
      ADD high_b, R1
      MOV R1, high_result

      MOV low_result, R1
      CMP low_expected, R1
      BNE fail
      MOV high_result, R1
      CMP high_expected, R1
      BNE fail
      OUT_CSTR ok
      HLT

  fail:
      OUT_CSTR err
      HLT

  .section data
  .org 0
  low_a:
      .word 5
  low_b:
      .word 6
  high_a:
      .word 1
  high_b:
      .word 2
  low_result:
      .word 0
  high_result:
      .word 0
  low_expected:
      .word 11
  high_expected:
      .word 3
  ok:
      .cstr "OK64"
  err:
      .cstr "ERR64"
in_input: ''
in_limit: 100000
out:
  out_stdout: OK64
  out_code_log: |
    0000 - 03030000010000 - MOV low_a, R1
    0007 - 04030001010000 - ADD low_b, R1
    000E - 03010000030004 - MOV R1, low_result
    0015 - 03030002010000 - MOV high_a, R1
    001C - 04030003010000 - ADD high_b, R1
    0023 - 03010000030005 - MOV R1, high_result
    002A - 03030004010000 - MOV low_result, R1
    0031 - 08030006010000 - CMP low_expected, R1
    0038 - 0A070053 - BNE fail
    003C - 03030005010000 - MOV high_result, R1
    0043 - 08030007010000 - CMP high_expected, R1
    004A - 0A070053 - BNE fail
    004E - 10080008 - OUT_CSTR ok
    0052 - 01 - HLT
    0053 - 1008000D - OUT_CSTR err
    0057 - 01 - HLT
  out_trace_contains: |
    OUT_CSTR[0] <- char=52 addr=000B
