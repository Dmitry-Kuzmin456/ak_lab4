in_source: |
  .section data
  zero: .word 0
  ten: .word 10
  eleven: .word 11
  min_factor: .word 100
  max_i: .word 999
  max_j: .word 990
  div10: .word 10
  div100: .word 100
  div1000: .word 1000
  div10000: .word 10000
  div100000: .word 100000
  ascii_zero: .word 48
  i: .word 0
  j: .word 0
  product: .word 0
  best: .word 0
  candidate: .word 0
  reversed: .word 0
  digit: .word 0
  print_value: .word 0

  .section text
  _start:
      MOV max_i, R1
      MOV R1, i
      MOV zero, R1
      MOV R1, best

  outer_loop:
      MOV i, R1
      CMP min_factor, R1
      BLT print_result

      MOV max_j, R1
      MOV R1, j

  inner_loop:
      MOV j, R1
      CMP min_factor, R1
      BLT dec_i

      MOV i, R1
      MUL j, R1
      MOV R1, product

      MOV product, R1
      CMP best, R1
      BGT check_palindrome
      JMP dec_i

  check_palindrome:
      MOV product, R1
      MOV R1, candidate
      MOV zero, R1
      MOV R1, reversed

  pal_loop:
      MOV candidate, R1
      CMP zero, R1
      BEQ pal_done

      MOV candidate, R1
      MOD ten, R1
      MOV R1, digit

      MOV reversed, R1
      MUL ten, R1
      ADD digit, R1
      MOV R1, reversed

      MOV candidate, R1
      DIV ten, R1
      MOV R1, candidate

      JMP pal_loop

  pal_done:
      MOV reversed, R1
      CMP product, R1
      BEQ update_best
      JMP dec_j

  update_best:
      MOV product, R1
      MOV R1, best

  dec_j:
      MOV j, R1
      SUB eleven, R1
      MOV R1, j
      JMP inner_loop

  dec_i:
      MOV i, R1
      DEC R1
      MOV R1, i
      JMP outer_loop

  print_result:
      MOV best, R1
      MOV R1, print_value

      MOV print_value, R1
      DIV div100000, R1
      ADD ascii_zero, R1
      OUT R1, 0
      MOV print_value, R1
      MOD div100000, R1
      MOV R1, print_value

      MOV print_value, R1
      DIV div10000, R1
      ADD ascii_zero, R1
      OUT R1, 0
      MOV print_value, R1
      MOD div10000, R1
      MOV R1, print_value

      MOV print_value, R1
      DIV div1000, R1
      ADD ascii_zero, R1
      OUT R1, 0
      MOV print_value, R1
      MOD div1000, R1
      MOV R1, print_value

      MOV print_value, R1
      DIV div100, R1
      ADD ascii_zero, R1
      OUT R1, 0
      MOV print_value, R1
      MOD div100, R1
      MOV R1, print_value

      MOV print_value, R1
      DIV div10, R1
      ADD ascii_zero, R1
      OUT R1, 0
      MOV print_value, R1
      MOD div10, R1
      ADD ascii_zero, R1
      OUT R1, 0

      HLT
